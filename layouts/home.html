{{ define "main" }}
  {{ partial "hero.html" . }}

  {{ $paginator := .Paginate site.RegularPages }}
  {{ with $paginator.Pages }}
    <section>
      <h2 class="section-title">{{ i18n "latest_posts" }}</h2>
      <div class="post-grid">
        {{ range . }}
          {{ partial "post-card.html" . }}
        {{ end }}
      </div>
      {{ partial "pagination.html" $ }}
    </section>
  {{ end }}
{{ end }}
