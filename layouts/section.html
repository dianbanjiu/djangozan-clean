{{ define "main" }}
  {{ partial "hero.html" . }}

  {{ $paginator := .Paginate .Pages }}
  {{ if $paginator.Pages }}
    <div class="post-grid">
      {{ range $paginator.Pages }}
        {{ partial "post-card.html" . }}
      {{ end }}
    </div>
    {{ partial "pagination.html" $ }}
  {{ else }}
    <p class="empty-state">{{ i18n "no_posts" }}</p>
  {{ end }}
{{ end }}
