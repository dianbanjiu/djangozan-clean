{{ define "main" }}
  {{ partial "hero.html" . }}

  {{ $paginator := .Paginate .Pages }}
  {{ with $paginator.Pages }}
    <div class="post-grid">
      {{ range . }}
        <article class="card post-card">
          <h3 class="post-title">
            <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
          </h3>
          <div class="post-meta">
            {{ partial "datetime.html" . }}
          </div>
          {{ with .Summary }}
            <div class="post-summary">{{ . }}</div>
          {{ end }}
        </article>
      {{ end }}
    </div>
    {{ partial "pagination.html" $ }}
  {{ end }}
{{ end }}
