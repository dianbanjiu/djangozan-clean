<article class="card post-card">
  <h3 class="post-title">
    <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
  </h3>
  <div class="post-meta">
    {{ partial "datetime.html" . }}
  </div>
  {{ with .Content }}
    {{ $paragraphs := findRE `<p>(.|\n)*?</p>` . }}
    {{ with index $paragraphs 0 }}
      <div class="post-summary">{{ . | plainify | truncate 150 }}</div>
    {{ end }}
  {{ end }}
  {{ with .GetTerms "tags" }}
    <div class="tags">
      {{ range . }}
        <a class="tag" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
      {{ end }}
    </div>
  {{ end }}
</article>
