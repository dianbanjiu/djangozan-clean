{{- $page := .page }}
{{- $taxonomy := .taxonomy }}

{{- with $page.GetTerms $taxonomy }}
  {{- $label := (index . 0).Parent.LinkTitle }}
  <div class="article-footer">
    <span class="post-meta">{{ $label }}:</span>
    <div class="tags">
      {{- range . }}
        <a class="tag" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
      {{- end }}
    </div>
  </div>
{{- end }}
