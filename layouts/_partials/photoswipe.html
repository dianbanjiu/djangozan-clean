<link rel="stylesheet" href="{{ "vendor/photoswipe/dist/photoswipe.css" | relURL }}">
<script src="{{ "vendor/photoswipe/dist/umd/photoswipe.umd.min.js" | relURL }}"></script>
<script src="{{ "vendor/photoswipe/dist/umd/photoswipe-lightbox.umd.min.js" | relURL }}"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var container = document.querySelector('.article-content');
    if (!container) return;

    // 对未被 render-image 模板包裹的 img 做动态包裹
    container.querySelectorAll('img').forEach(function (img) {
      if (img.closest('a')) return;
      var wrapper = document.createElement('a');
      wrapper.href = img.src;
      wrapper.setAttribute('data-pswp-width', img.naturalWidth || 1600);
      wrapper.setAttribute('data-pswp-height', img.naturalHeight || 1200);
      wrapper.setAttribute('target', '_blank');
      wrapper.setAttribute('rel', 'noopener');
      img.parentNode.insertBefore(wrapper, img);
      wrapper.appendChild(img);
      img.addEventListener('load', function () {
        wrapper.setAttribute('data-pswp-width', img.naturalWidth);
        wrapper.setAttribute('data-pswp-height', img.naturalHeight);
      });
    });

    var links = container.querySelectorAll('a[data-pswp-width]');
    if (!links.length) return;

    var lightbox = new PhotoSwipeLightbox({
      gallery: '.article-content',
      children: 'a[data-pswp-width]',
      pswpModule: PhotoSwipe,
      bgClickAction: 'close',
      tapAction: 'close',
      showAnimationDuration: 250,
      hideAnimationDuration: 200,
      zoomAnimationDuration: 250,
      showHideAnimationType: 'zoom',
      bgOpacity: 0.9
    });

    var thumbLinks = container.querySelectorAll('a[data-pswp-width]');
    lightbox.addFilter('thumbEl', function (thumbEl, data, index) {
      var link = thumbLinks[index];
      return link ? link.querySelector('img') || thumbEl : thumbEl;
    });

    lightbox.init();
  });
</script>
